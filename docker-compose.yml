networks:
  emp-net:
    driver: bridge

volumes:
  dynamodb-data:
  localstack-data:

services:

  dynamodb-local:
    image: amazon/dynamodb-local:1.25.0
    container_name: emp-dynamodb
    command: >
      -jar DynamoDBLocal.jar
      -sharedDb
      -dbPath /home/dynamodblocal/data
    ports:
      - "8000:8000"
    volumes:
      - dynamodb-data:/home/dynamodblocal/data
    networks:
      emp-net:
        aliases:
          - dynamodb
    healthcheck:
      test: ["CMD-SHELL", "java -version 2>&1 | grep -q 'version' && echo OK || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s

  dynamodb-admin:
    image: aaronshaf/dynamodb-admin:latest
    container_name: emp-dynamodb-admin
    environment:
      DYNAMO_ENDPOINT: http://dynamodb-local:8000
      AWS_REGION: us-east-1
      AWS_ACCESS_KEY_ID: fakeMyKeyId
      AWS_SECRET_ACCESS_KEY: fakeSecretAccessKey
    ports:
      - "8001:8001"
    depends_on:
      dynamodb-local:
        condition: service_healthy
    networks:
      - emp-net

  localstack:
    image: localstack/localstack:3.6
    container_name: emp-localstack
    environment:
      SERVICES: sqs
      DEBUG: 0
      DEFAULT_REGION: us-east-1
      PERSISTENCE: 1
      DATA_DIR: /var/lib/localstack/data
    ports:
      - "4566:4566"
    volumes:
      - localstack-data:/var/lib/localstack
      - ./docker/localstack/init-sqs.sh:/etc/localstack/init/ready.d/init-sqs.sh:ro
    networks:
      - emp-net
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:4566/_localstack/health | grep -q 'running'"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: emp-app
    profiles: ["app"]
    environment:
      SPRING_PROFILES_ACTIVE: local
      SERVER_PORT: 8080
      AWS_REGION: us-east-1
      DYNAMODB_ENDPOINT: http://dynamodb-local:8000
      SQS_ENDPOINT: http://localstack:4566
      LOG_LEVEL_APP: DEBUG
    ports:
      - "8080:8080"
    depends_on:
      dynamodb-local:
        condition: service_healthy
      localstack:
        condition: service_healthy
    networks:
      - emp-net
    restart: unless-stopped