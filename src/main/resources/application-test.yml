# ══════════════════════════════════════════════════════════════
#  application-test.yml — Profile active in integration tests
#
#  IMPORTANT: these values are deliberately reduced so that
#  expiration tests can run in under 5 seconds.
#  NEVER use these values in production.
# ══════════════════════════════════════════════════════════════
spring:
  # Disables the SQS consumer in tests to avoid polling loops.
  # Tests that need SQS control it manually.
  autoconfigure:
    exclude: []

aws:
  region: us-east-1
  dynamodb:
    # Will be overridden by TestcontainersConfiguration @Primary bean
    endpoint: http://localhost:8080
    tables:
      events: emp-test-events
      tickets: emp-test-tickets
      orders: emp-test-orders
      idempotency: emp-test-idempotency
      audit: emp-test-audit
      shedlock: emp-test-shedlock
  sqs:
    # Will be overridden by TestcontainersConfiguration @Primary bean
    endpoint: http://localhost:4566
    queues:
      purchase-orders:     emp-test-purchase-orders
      purchase-orders-dlq: emp-test-purchase-orders-dlq
    consumer:
      max-messages:       5
      visibility-timeout: 10
      wait-time-seconds:  1
      polling-interval:   500

ticketing:
  reservation:
    # TTL of 1 minute. In expiration tests, tickets are inserted with
    # expiresAt in the past directly into DynamoDB, so the test does not
    # need to wait for the real TTL. In production this value is 10 minutes.
    ttl-minutes: 1
    # Expiration job runs every 200ms — responds quickly in expiration tests
    expiry-job-interval: 200
  idempotency:
    ttl-hours: 1
  max-tickets-per-order: 10
  pagination:
    default-page-size: 20
    max-page-size: 100

# Reduced logging in tests for cleaner output
logging:
  level:
    root: WARN
    com.nequi.ticketing: INFO
    software.amazon.awssdk: WARN
    org.testcontainers: INFO
    reactor.netty: WARN