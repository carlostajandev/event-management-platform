# ============================================================
# CI/CD Pipeline — Event Management Platform
#
# Triggers:
#   - Push a main/develop: build + test + deploy a staging
#   - Pull Request a main: validate + test (no deploy)
#   - Push tag v*: deploy a producción
#
# Jobs:
#   1. test        — Maven build + 65 tests + JaCoCo
#   2. tf-validate — terraform fmt + validate (sin credenciales)
#   3. docker      — build + push a ECR (solo main/tags)
#   4. tf-plan     — terraform plan contra staging
#   5. tf-apply    — terraform apply (requiere aprobación manual en prod)
#   6. deploy      — ECS rolling update
# ============================================================

name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
    tags: ['v*']
  pull_request:
    branches: [main, develop]

env:
  AWS_REGION: us-east-1
  ECR_REPOSITORY: emp
  JAVA_VERSION: '21'

jobs:

  # ──────────────────────────────────────────────────────────
  # JOB 1: Build y Tests
  # ──────────────────────────────────────────────────────────
  test:
    name: Build & Test
    runs-on: ubuntu-latest

    services:
      # DynamoDB Local para tests de integración
      dynamodb-local:
        image: amazon/dynamodb-local:1.25.0
        ports:
          - 8000:8000

      # LocalStack para SQS
      localstack:
        image: localstack/localstack:3.6
        ports:
          - 4566:4566
        env:
          SERVICES: sqs

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 21 LTS
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
          cache: maven

      - name: Build and run tests
        run: ./mvnw verify --no-transfer-progress
        env:
          SPRING_PROFILES_ACTIVE: local
          DYNAMODB_ENDPOINT: http://localhost:8000
          SQS_ENDPOINT: http://localhost:4566

      - name: Upload JaCoCo coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: jacoco-report
          path: target/site/jacoco/

      - name: Check coverage gate
        run: |
          echo "Coverage gate enforced by JaCoCo in pom.xml — build fails if < 80% lines / 70% branches"

  # ──────────────────────────────────────────────────────────
  # JOB 2: Terraform Validate
  # No requiere credenciales AWS — solo valida sintaxis
  # ──────────────────────────────────────────────────────────
  tf-validate:
    name: Terraform Validate
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~> 1.7"

      - name: Terraform Format Check
        working-directory: terraform
        run: |
          terraform fmt -check -recursive
          echo "✓ All .tf files are properly formatted"

      - name: Terraform Init (local validation only)
        working-directory: terraform
        run: terraform init -backend=false

      - name: Terraform Validate
        working-directory: terraform
        run: |
          terraform validate
          echo "✓ Terraform configuration is valid"

  # ──────────────────────────────────────────────────────────
  # JOB 3: Docker Build + Push a ECR
  # Solo en push a main o tags de versión
  # ──────────────────────────────────────────────────────────
  docker:
    name: Docker Build & Push
    runs-on: ubuntu-latest
    needs: [test, tf-validate]
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v'))

    outputs:
      image-tag: ${{ steps.meta.outputs.tags }}
      image-digest: ${{ steps.build.outputs.digest }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 21 for Docker build
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
          cache: maven

      - name: Build JAR
        run: ./mvnw package -DskipTests --no-transfer-progress

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=sha,prefix=sha-,format=short

      - name: Build and push Docker image
        id: build
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ──────────────────────────────────────────────────────────
  # JOB 4: Terraform Plan (staging)
  # ──────────────────────────────────────────────────────────
  tf-plan:
    name: Terraform Plan (staging)
    runs-on: ubuntu-latest
    needs: [docker]
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~> 1.7"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Terraform Init
        working-directory: terraform
        run: terraform init

      - name: Terraform Plan
        working-directory: terraform
        run: |
          terraform plan \
            -var-file=environments/dev.tfvars \
            -var="app_image=${{ needs.docker.outputs.image-tag }}" \
            -out=tfplan \
            -no-color
        env:
          TF_VAR_environment: staging

      - name: Upload plan artifact
        uses: actions/upload-artifact@v4
        with:
          name: tfplan
          path: terraform/tfplan
          retention-days: 5

  # ──────────────────────────────────────────────────────────
  # JOB 5: Terraform Apply + Deploy (producción)
  # Solo en tags v* — requiere aprobación manual en GitHub
  # ──────────────────────────────────────────────────────────
  deploy-prod:
    name: Deploy Production
    runs-on: ubuntu-latest
    needs: [docker]
    if: startsWith(github.ref, 'refs/tags/v')
    environment:
      name: production       # ← Requiere aprobación manual en GitHub Settings
      url: https://ticketing.nequi.com

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~> 1.7"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Terraform Init
        working-directory: terraform
        run: terraform init

      - name: Terraform Apply
        working-directory: terraform
        run: |
          terraform apply \
            -var-file=environments/prod.tfvars \
            -var="app_image=${{ needs.docker.outputs.image-tag }}" \
            -auto-approve \
            -no-color

      - name: Wait for ECS deployment
        run: |
          aws ecs wait services-stable \
            --cluster emp-prod-cluster \
            --services emp-prod-service \
            --region ${{ env.AWS_REGION }}
          echo "✓ ECS service stable"

      - name: Smoke test
        run: |
          ALB_DNS=$(terraform -chdir=terraform output -raw alb_dns_name)
          curl -f "https://${ALB_DNS}/actuator/health" | jq '.status'
          echo "✓ Health check passed"
