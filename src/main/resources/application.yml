# ══════════════════════════════════════════════════════════════
#  Event Management Platform — application.yml
#  Spring Boot 4.0.3 / WebFlux / DynamoDB / SQS
#
#  REGLA: ningún valor sensible hardcodeado aquí.
#  Todo lo que cambia por entorno viene de variables de entorno.
# ══════════════════════════════════════════════════════════════

spring:
  application:
    name: event-management-platform
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:local}

  # Virtual threads — Project Loom, Java 21+
  threads:
    virtual:
      enabled: true

  # Jackson — ISO-8601, sin nulls en respuestas
  jackson:
    default-property-inclusion: non_null
    time-zone: UTC

# ── Servidor ──────────────────────────────────────────────────
server:
  port: ${SERVER_PORT:8080}
  shutdown: graceful
  netty:
    connection-timeout: 5s
    idle-timeout: 60s

# ── Actuator ──────────────────────────────────────────────────
management:
  endpoints:
    web:
      exposure:
        include: health, info, metrics, prometheus, env
  endpoint:
    health:
      show-details: always
      probes:
        enabled: true
  metrics:
    tags:
      application: ${spring.application.name}
      environment: ${spring.profiles.active}

# ── AWS ───────────────────────────────────────────────────────
aws:
  region: ${AWS_REGION:us-east-1}
  dynamodb:
    endpoint: ${DYNAMODB_ENDPOINT:http://localhost:8000}
    tables:
      events:      ${DYNAMODB_TABLE_EVENTS:emp-events}
      tickets:     ${DYNAMODB_TABLE_TICKETS:emp-tickets}
      orders:      ${DYNAMODB_TABLE_ORDERS:emp-orders}
      idempotency: ${DYNAMODB_TABLE_IDEMPOTENCY:emp-idempotency}
      audit:       ${DYNAMODB_TABLE_AUDIT:emp-audit}
  sqs:
    endpoint: ${SQS_ENDPOINT:http://localhost:4566}
    queues:
      purchase-orders:     ${SQS_QUEUE_ORDERS:emp-purchase-orders}
      purchase-orders-dlq: ${SQS_QUEUE_DLQ:emp-purchase-orders-dlq}
    consumer:
      max-messages:        10
      visibility-timeout:  30
      wait-time-seconds:   20
      polling-interval:    5000

# ── Reglas de negocio ─────────────────────────────────────────
ticketing:
  reservation:
    ttl-minutes:         ${RESERVATION_TTL_MINUTES:10}
    expiry-job-interval: ${EXPIRY_JOB_INTERVAL_MS:60000}
  idempotency:
    ttl-hours:           ${IDEMPOTENCY_TTL_HOURS:24}
  max-tickets-per-order: ${MAX_TICKETS_PER_ORDER:10}

# ── Resilience4j ──────────────────────────────────────────────
resilience4j:
  retry:
    instances:
      dynamodb-write:
        max-attempts: 3
        wait-duration: 200ms
        exponential-backoff-multiplier: 2
      sqs-publish:
        max-attempts: 3
        wait-duration: 500ms
        exponential-backoff-multiplier: 2

  circuitbreaker:
    instances:
      dynamodb:
        sliding-window-size: 20
        failure-rate-threshold: 50
        wait-duration-in-open-state: 30s
        permitted-number-of-calls-in-half-open-state: 5

  ratelimiter:
    instances:
      purchase-api:
        limit-for-period: ${RATE_LIMIT_PER_SECOND:100}
        limit-refresh-period: 1s
        timeout-duration: 0s

# ── Logging ───────────────────────────────────────────────────
logging:
  level:
    root: INFO
    com.nequi.ticketing: ${LOG_LEVEL_APP:DEBUG}
    software.amazon.awssdk: WARN
    reactor.netty: WARN
